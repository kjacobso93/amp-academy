    <style>

        .bg-gold { background-color: var(--gold); }

        .border-gold { border-color: var(--gold); }
        
        .hero-gradient {
            background: linear-gradient(rgba(80, 0, 0, 0.9), rgba(18, 18, 18, 1)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
