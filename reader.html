<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ebook | Florin AMP Academy</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-gold { color: #CFB87C; }
        #viewer { width: 100%; height: 600px; background: white; border-radius: 8px; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans">

    <section class="py-12 px-6 max-w-5xl mx-auto">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Interactive <span class="text-gold">Production Guide</span></h1>
            <p class="text-gray-400">Read the guide and listen to student-produced audio examples below.</p>
        </div>

        <div class="relative bg-white rounded-xl shadow-2xl p-2">
            <div id="viewer"></div>
            
            <div class="flex justify-between p-4 bg-gray-100 rounded-b-xl border-t border-gray-200">
                <button id="prev" class="bg-maroon text-white px-6 py-2 rounded font-bold uppercase text-xs hover:bg-gold hover:text-maroon transition">Prev</button>
                <button id="next" class="bg-maroon text-white px-6 py-2 rounded font-bold uppercase text-xs hover:bg-gold hover:text-maroon transition">Next</button>
            </div>
        </div>
    </section>

    <script>
    // 1. Path to your ebook on Google Drive
    var book = ePub("https://drive.google.com/uc?export=download&id=1btkrelvRiGqzqI0Kw2HmhD5R7KVSyg8U");
    
    // 2. THIS WAS THE MISSING PART: We must define 'rendition'
    var rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: "paginated",
        manager: "default"
    });

    // 3. Display the book
    var display = rendition.display();

    // 4. Navigation Logic
    document.getElementById("next").addEventListener("click", function(e){
        rendition.next();
        e.preventDefault();
    }, false);

    document.getElementById("prev").addEventListener("click", function(e){
        rendition.prev();
        e.preventDefault();
    }, false);

    // 5. Keyboard Support
    document.addEventListener("keyup", function(e){
        if ((e.keyCode || e.which) == 37) rendition.prev();
        if ((e.keyCode || e.which) == 39) rendition.next();
    }, false);
</script>

</body>
</html>
