<body class="bg-[#0f0f0f] text-white font-sans">

    <section class="py-12 px-6 max-w-5xl mx-auto">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Interactive <span class="text-gold">Production Guide</span></h1>
            <p id="status" class="text-gold font-bold animate-pulse">Loading Academy Ebook...</p>
        </div>

        <div class="relative bg-white rounded-xl shadow-2xl p-2">
            <div id="viewer"></div>
            </div>
    </section>

    <script>
        // Ensure this matches your GitHub file name exactly!
        var book = ePub("documents/student-ebook.epub"); 
        var rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated",
            manager: "default"
        });

        var display = rendition.display();

        // Status update when book loads
        display.then(function() {
            document.getElementById("status").textContent = "Use buttons or arrow keys to read";
            document.getElementById("status").classList.remove("animate-pulse");
        });

        // Navigation Logic
        document.getElementById("next").addEventListener("click", function(e){
            rendition.next();
            e.preventDefault();
        }, false);

        document.getElementById("prev").addEventListener("click", function(e){
            rendition.prev();
            e.preventDefault();
        }, false);
    </script>
</body>
