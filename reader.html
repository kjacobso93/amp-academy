<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ebook | Florin AMP Academy</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .text-gold { color: #CFB87C; }
        .bg-maroon { background-color: #500000; }
        /* Ensuring the viewer has a solid height */
        #viewer { 
            width: 100%; 
            height: 600px; 
            background: white; 
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans">

    <section class="py-12 px-6 max-w-5xl mx-auto">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Interactive <span class="text-gold">Production Guide</span></h1>
            <p id="loading-status" class="text-gold animate-pulse">Initializing Academy Reader...</p>
        </div>

        <div class="relative bg-white rounded-xl shadow-2xl p-2">
            <div id="viewer"></div>
            
            <div class="flex justify-between p-4 bg-gray-100 rounded-b-xl border-t border-gray-200">
                <button id="prev" class="bg-maroon text-white px-6 py-2 rounded font-bold uppercase text-xs hover:bg-gold hover:text-maroon transition">Prev</button>
                <button id="next" class="bg-maroon text-white px-6 py-2 rounded font-bold uppercase text-xs hover:bg-gold hover:text-maroon transition">Next</button>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <a href="work.html" class="text-gray-500 hover:text-gold text-xs uppercase tracking-widest transition">← Back to Student Work</a>
        </div>
    </section>

    <script>
        // Use the local path - Ensure the file name is EXACTLY this in your documents folder
        var book = ePub("documents/student-ebook.epub");
        
        var rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated",
            manager: "default"
        });

        // Start the book
        var display = rendition.display();

        // Update status when loaded
        book.ready.then(function() {
            document.getElementById("loading-status").textContent = "Guide Loaded. Use buttons to navigate.";
            document.getElementById("loading-status").classList.remove("animate-pulse");
        }).catch(function(err) {
            document.getElementById("loading-status").textContent = "Error: File not found in /documents folder.";
            console.error(err);
        });

        // Navigation Logic
        document.getElementById("next").addEventListener("click", function(e){
            rendition.next();
            e.preventDefault();
        }, false);

        document.getElementById("prev").addEventListener("click", function(e){
            rendition.prev();
            e.preventDefault();
        }, false);
    </script>
</body>
</html>
